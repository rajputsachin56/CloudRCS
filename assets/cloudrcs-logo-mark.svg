<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">CloudRCS logo mark</title>
  <desc id="desc">Simple CloudRCS CR monogram.</desc>
  <defs>
    <linearGradient id="mark" x1="14" y1="14" x2="114" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5B5CF6"/>
      <stop offset="1" stop-color="#18B6F6"/>
    </linearGradient>
  </defs>
  <rect x="14" y="14" width="100" height="100" rx="28" fill="url(#mark)"/>
  <text x="64" y="78" text-anchor="middle" fill="#FFFFFF" font-family="Sora, Plus Jakarta Sans, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="-1.8">CR</text>
  <circle cx="104" cy="27" r="8" fill="#00C2A8"/>
</svg>
