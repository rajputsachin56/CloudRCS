<svg xmlns="http://www.w3.org/2000/svg" width="360" height="88" viewBox="0 0 360 88" role="img" aria-labelledby="title desc">
  <title id="title">CloudRCS logo</title>
  <desc id="desc">Simple CloudRCS logo with CR monogram and company wordmark.</desc>
  <defs>
    <linearGradient id="mark" x1="10" y1="10" x2="74" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5B5CF6"/>
      <stop offset="1" stop-color="#18B6F6"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="68" height="68" rx="18" fill="url(#mark)"/>
  <text x="44" y="55" text-anchor="middle" fill="#FFFFFF" font-family="Sora, Plus Jakarta Sans, Arial, sans-serif" font-size="29" font-weight="800" letter-spacing="-1">CR</text>
  <circle cx="70" cy="19" r="5" fill="#00C2A8"/>
  <text x="96" y="48" fill="#17132F" font-family="Sora, Plus Jakarta Sans, Arial, sans-serif" font-size="37" font-weight="800" letter-spacing="-0.8">CloudRCS</text>
  <text x="98" y="68" fill="#667085" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">DIGITAL COMMUNICATIONS</text>
</svg>
